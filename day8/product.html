<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            margin: 0px;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
            height: 100vh;
            
            display: flex;
            justify-content: center;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
        }
        .product{
            border-bottom: 1px solid black;
            width: 250px;
            padding: 12px;
            border-radius: 12px;
            margin: 15px;
            text-align: center;
            box-shadow: 4 4 8px black; /* Xasis Yasix Spread-Radius Color*/
        }
        .product hover{
            background-color: red;
            size: 5%;
            transition: 2s;
            transform: scale(1.03);
            color: white;
        }
        .product h2{
            border-bottom: 1px solid black;
        }
        .product img{
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 12px;
        }
        button{
            background-color: orange;
            border: none;
            padding: 10px;
            border-radius: 12px;
            width: 90%;
        }
    </style>
</head>
<body>
    <div class="product">
        <img url="https://images.pexels.com/photos/7772548/pexels-photo-7772548.jpeg">
        <h2>Headphone</h2>
        <p>Rs 2499 </p>
        <button>Buy Now</button>
    </div>
    <div class="product">
        <img url="https://images.pexels.com/photos/20432893/pexels-photo-20432893.jpeg" >
        <h2>laptop</h2>
        <p>rs 25000</p>
        <button>Buy Now</button>
    </div>
    <div class="product">
        <img url="https://images.pexels.com/photos/569062/pexels-photo-569062.png" >
        <h2>Phone</h2>
        <p>rs 9,999</p>
        <button>Buy Now</button>
    </div>
    <div class="product">
        <img url="https://images.pexels.com/photos/1027130/pexels-photo-1027130.jpeg">
        <h2>shoes</h2>
        <p>rs 999</p>
        <button>Buy Now</button>
    </div>
</body>
</html>
