<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- Input tag help us to get data from user-->
     <input>
    <!-- placeholder is to write text to describe the input box-->
     <label>Username</label>
     <input placeholder="Enter your username">
     <label>Email</label>
     <input type="email" placeholder="abc@xyz.com">
     <label>Password</label>
     <input type="password">
     <label>Contact</label>
     <input type="tel">
     <label>DOB</label>
     <input type="date">
     <label>File</label>
     <input type="file">
</body>
</html>
