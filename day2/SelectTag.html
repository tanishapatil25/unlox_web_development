<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <select name="Country">
        <option>India</option>
        <option>Russia</option>
        <option>Japan</option>
        <option disabled>Germany</option>  <!--cannot select -->
        <option selected disabled>Country</option>
        <option label="USA">United State of America</option>  <!--label to make shortcut name-->
    </select>

    <select disabled> <!--cannot choose-->
        <option>India</option>
        <option>Russia</option>
        <option>Japan</option>
        <option disabled>Germany</option>  <!--cannot select -->
        <option selected disabled>Country</option>
    </select>

    <select required>       <!--mandatory-->
        <option>India</option>
        <option>Russia</option>
        <option>Japan</option>
        <option disabled>Germany</option>  <!--cannot select -->
        <option selected disabled>Country</option>
    </select>

    <select multiple> <!-- select mutiple using ctrl-->
        <option>India</option>
        <option>Russia</option>
        <option>Japan</option>
        <option disabled>Germany</option>  <!--cannot select -->
        <option selected disabled>Country</option>
    </select>
    <select size="2">
        <option>India</option>
        <option>Russia</option>
        <option>Japan</option>
        <option disabled>Germany</option>  <!--cannot select -->
        <option selected disabled>Country</option>
    </select>
</body>
</html>
