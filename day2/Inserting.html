<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!--details and summary tags-->
    <details>
    <summary>
        What is Netflix
    </summary>
    <p>Netflix is an OTT Platform</p>
    </details>
    <progress></progress>
    <progress value="80" max="100"></progress>
    <!--measurement-->
    <meter value="30" min="0" max="100"></meter>
    <!--short form-->
    <abbr title="HyperText Markup LANGUAGE">HTML</abbr>
    
    <!--used to specify that it is a coding text-->
    <P>
        Use <code>console.log()</code> to print output.
    </P>
    <!--representation of keyboard keys-->
    <p>
        Press <kbd>Ctrl</kbd> + <kbd>C</kbd>
    </p>
    <!--text moving from right to left-->
    <marquee>Welcome To Website</marquee>
    <p>
        Event date
        <!--imporatant for search engine optimisation, SEO-->
        <time datetime="2026-09-29">
            September 29, 2026
        </time>
    </p>
    <!--popup-->
    <dialog open>Hello i am PopUp</dialog>
</body>
</html>
