<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //variable- it is a box in which we store value
        //syntax- variableType/keyword VariableName = value
        
        ///variable will only store one value at a time

        //1. var keyword- js creates a variable
        var username = "Tanisha" //"Text" - inside Quotes
        console.log(username)

        var height = 5.9 // number - directly
        console.log("The value of height", height)

        var country = "India"

        var country = "Bharat"
        console.log(country)
        //disadvantage of avr is it allows you to use same variable name
        //2. let keyword- you cannot use same variableName again
        let email = "abc@gmail.com"
        console.log("email")
        let fruit = "Mango"
        fruit = "Apple"
        console.log(fruit)


        //3. const keyword - fixed, cannot be changed
        const appName = "Whatapp"
        //appName = "Flipkart" //error
        console.log(appName)
    </script>
</body>
</html>
