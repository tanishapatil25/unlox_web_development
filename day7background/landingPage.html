<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    .hero{
        height: 100vh;
        background-image: url("https://images.pexels.com/photos/6804612/pexels-photo-6804612.jpeg");
        background-position: center;
        background-size: cover;
        background-repeat: no-repeat;
        color: white;
        display: flex;
        font-size: 50px;
        align-items: center;
        filter: blur(5px);
        /*filter: brightness(50%);      darkness increases*/ 
        filter: brightness(140%); /* brightness increases if 0% it will become dark*/
    }
    </style>
</head>
<body>
    <section class="hero">
        <h1>FullStack Developer 2026</h1>
    </section>
</body>
</html>
