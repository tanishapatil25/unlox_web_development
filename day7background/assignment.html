<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            background-image: url("https://images.pexels.com/photos/6804612/pexels-photo-6804612.jpeg");
            background-position: center;
            background-size: cover;
            color: white;
            display: flex;
            height: 50vh;
            align-self: center;
            text-align: center;
        }
        #h1{
            position: absolute;
            z-index: 5;
            left: 200px;
            top: 100px;
            color: black;
            font-size: 50px;
        }
        #h2{
            position: absolute;
            z-index: 1;
            left: 205px;
            color: gray;
            top:100.5px;
            font-size: 50px;
        }
    </style>
</head>
<body>
    <section class="box">
        <h1 id="h1">FullStack Developer</h1>
        <h1 id="h2">FullStack Developer</h1>
    </section>
</body>
</html>
