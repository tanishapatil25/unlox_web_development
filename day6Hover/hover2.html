<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #box{
            background-color: red;
            height: 100px;
            width: 100px;
        }
        #box:hover{
            transform: translateX(100px);
            background-color: blueviolet;
            transition: 3s;
        }
        #box2:hover{
            background-color: red;
            transform: rotate(360deg);
            transition: 3s;
        }
        #box3:hover{
            background-color: blue;
            transform: rotateX(180deg);
            transition: 3s;
        }
        #box4:hover{
            background-color: aqua;
            transform: scale(1.2);
            transition: 3s;
        }
        #box5:hover{
            background-color: blanchedalmond;
            transform: scaleX(1.2);
            transition: 3s;
        }
    </style>
</head>
<body>
    <div id="box">
        Hi
    </div>
    <div id="box2">
        Hi
    </div>
    <div id="box3">
        Hi
    </div>
    <div id="box4">
        Hi
    </div>
    <div id="box5">
        Hi
    </div>
</body>
</html>
